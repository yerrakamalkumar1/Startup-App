<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connect Hub Profile</title>
  <meta name="description" content="Public Connect Hub profile for Indian startups, freelancers, and investors.">
  <meta property="og:title" content="Connect Hub Profile">
  <meta property="og:description" content="View skills, sector, portfolio, media posts, reviews, and connect on Connect Hub India.">
  <meta property="og:type" content="profile">
  <meta property="og:image" content="/assets/logo.png">
  <link rel="stylesheet" href="/index.css">
  <link rel="stylesheet" href="/public/css/theme.css">
  <link rel="stylesheet" href="/public/css/components.css">
</head>
<body class="public-profile-body">
  <main id="profileCard" class="public-profile-shell">Loading profile...</main>

  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="/public/js/app-core.js"></script>
  <script src="/config.js"></script>
  <script src="/db.js"></script>
  <script>
    const savedTheme = localStorage.getItem("connecthub_theme") || "light";
    document.documentElement.dataset.theme = savedTheme;
    document.body.classList.toggle("dark", savedTheme === "dark");
    let activeProfileCache = null;
    let activeProfilePosts = [];

    function playProfileBell() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = "sine";
        osc.frequency.value = 1046;
        gain.gain.value = 0.028;
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start();
        gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.11);
        osc.stop(ctx.currentTime + 0.14);
      } catch {}
    }

    function roleLabel(role) {
      return role === "startup_admin" ? "Startup Owner" : role === "investor" ? "Investor" : "Freelancer";
    }

    function profileId(profile) {
      return String(profile.email || profile.name || "")
        .toLowerCase()
        .replace(/@.*/, "")
        .replace(/[^a-z0-9]+/g, "_")
        .replace(/^_|_$/g, "");
    }

    function normalizeProfileLookupId(value) {
      return String(value || "")
        .toLowerCase()
        .replace(/@.*/, "")
        .replace(/[^a-z0-9]+/g, "_")
        .replace(/^_|_$/g, "");
    }

    function getPublicProfiles() {
      const db = getDB();
      const users = getAllProfiles();
      const existing = new Set(users.map(profile => normalizeProfileLookupId(profile.email || profile.name)));
      const feedProfiles = [
        { name: "Rahul Mehta", email: "rahul_mehta", role: "startup_admin", title: "Founder", companyName: "TechNova", city: "Bangalore", state: "Karnataka", bio: "Building B2B CRM for Indian SMEs and hiring product talent.", sector: "SaaS & Technology", avatarInitials: "RM", skills: ["SaaS", "CRM", "Seed Funding"] },
        { name: "Priya Sharma", email: "priya_sharma", role: "freelancer", title: "UI/UX Designer", city: "Mumbai", state: "Maharashtra", bio: "Design systems, fintech dashboards, and startup launch interfaces.", avatarInitials: "PS", skills: ["Figma", "UI Design", "Design Systems"] },
        { name: "Sunita Rao", email: "sunita_rao", role: "investor", title: "Angel Investor", city: "Bangalore", state: "Karnataka", bio: "Investing in EdTech, consumer products, and early Indian startup teams.", avatarInitials: "SR", skills: ["Seed", "EdTech", "Consumer"] },
        { name: "GreenEats", email: "greeneats", role: "startup_admin", title: "FoodTech Startup", companyName: "GreenEats", city: "Mumbai", state: "Maharashtra", bio: "Reducing food waste in pilot kitchens using AI demand forecasting.", sector: "FoodTech", avatarInitials: "GE", skills: ["FoodTech", "Sustainability", "AI Forecasting"] },
        { name: "Karthik Raj", email: "karthik_raj", role: "freelancer", title: "Android Developer", city: "Chennai", state: "Tamil Nadu", bio: "Android developer with 30+ shipped mobile apps for startups.", avatarInitials: "KR", skills: ["Android", "Kotlin", "Mobile Apps"] },
        { name: "Dev Malhotra", email: "dev_malhotra", role: "investor", title: "Sequoia Scout", city: "Mumbai", state: "Maharashtra", bio: "Tracking Tier 2 startup opportunities across India.", avatarInitials: "DM", skills: ["Investing", "Tier 2", "Startups"] }
      ].filter(profile => !existing.has(normalizeProfileLookupId(profile.email || profile.name)));
      const startupProfiles = (db.startups || [])
        .filter(startup => startup?.name)
        .map(startup => ({
          name: startup.name,
          email: startup.id,
          role: "startup_admin",
          title: startup.stage || "Startup Owner",
          companyName: startup.name,
          startupId: startup.id,
          city: startup.city || "",
          state: startup.state || "",
          bio: startup.description || "",
          sector: startup.sector || "",
          avatarInitials: startup.logoInitials || startup.name.split(" ").map(word => word[0]).join("").slice(0, 2).toUpperCase()
        }))
        .filter(profile => !existing.has(normalizeProfileLookupId(profile.email || profile.name)));
      return [...users, ...startupProfiles, ...feedProfiles];
    }

    function escapeHTML(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function escapeAttr(value) {
      return escapeHTML(value).replace(/`/g, "&#096;");
    }

    function jsArg(value) {
      return String(value || "").replace(/\\/g, "\\\\").replace(/'/g, "\\'");
    }

    function detailLine(profile, startup) {
      const parts = [];
      if (profile.role === "freelancer") parts.push(profile.title || "Freelancer");
      if (profile.role === "startup_admin") parts.push(startup?.sector || profile.companyName || "Startup");
      if (profile.role === "investor") parts.push(profile.title || "Investor / Sponsor");
      const city = [profile.city || startup?.city, profile.state || startup?.state].filter(Boolean).join(", ");
      if (city) parts.push(city);
      return parts.join(" · ") || "ConnectHub India";
    }

    function mediaType(post) {
      const type = post.mediaType || post.media?.type || "";
      return type.startsWith("video/") ? "Reel" : post.media ? "Photo" : "Post";
    }

    function collectProfilePosts(profile, startup) {
      const db = getDB();
      const posts = [];
      (db.profilePosts || [])
        .filter(post => post.authorEmail === profile.email || post.authorName === profile.name)
        .forEach(post => posts.push({
          id: post.id,
          owner: profile.name,
          author: post.authorName,
          title: post.title || "Profile update",
          text: post.description || post.caption || "",
          meta: post.meta || roleLabel(profile.role),
          tags: post.tags || [],
          media: post.media,
          mediaType: post.mediaType,
          date: post.postedDate || "Recently",
          kind: "profile"
        }));
      (db.freelancerAds || [])
        .filter(ad => ad.freelancerName === profile.name)
        .forEach(ad => posts.push({
          id: `ad-${ad.id}`,
          owner: profile.name,
          author: profile.name,
          title: ad.title,
          text: ad.description,
          meta: `${ad.category || "Service"} · ${ad.price || "Custom quote"}`,
          tags: ad.tags || [],
          media: ad.media,
          mediaType: ad.mediaType,
          date: ad.appliedDate || "Recently",
          kind: "ad"
        }));
      (db.startupPromotions || [])
        .filter(post => post.startupName === (profile.companyName || startup?.name || profile.name))
        .forEach(post => posts.push({
          id: `promo-${post.id}`,
          owner: profile.name,
          author: post.startupName,
          title: post.title,
          text: post.description,
          meta: "Startup media update",
          tags: post.tags || [],
          media: post.media,
          mediaType: post.mediaType,
          date: post.postedDate || "Recently",
          kind: "promo"
        }));
      if (startup) {
        (db.jobs || [])
          .filter(job => job.startupId === startup.id)
          .forEach(job => posts.push({
            id: `job-${job.id}`,
            owner: profile.name,
            author: startup.name,
            title: job.title,
            text: job.description,
            meta: `Opportunity · Rs ${job.hourlyRate}/hr`,
            tags: job.tags || [],
            date: job.status || "Active",
            kind: "job"
          }));
      }
      if (!posts.length) {
        posts.push({
          id: `intro-${profileId(profile)}`,
          owner: profile.name,
          author: profile.name,
          title: `${roleLabel(profile.role)} profile`,
          text: profile.bio || "Open to meaningful business conversations, collaborations, deals, and partnerships on ConnectHub.",
          meta: detailLine(profile, startup),
          tags: profile.skills || [startup?.sector, profile.title].filter(Boolean),
          date: "Profile",
          kind: "intro"
        });
      }
      return posts;
    }

    function renderMediaBlock(post) {
      if (post.media) return renderMedia(post.media, post.mediaType);
      const label = mediaType(post);
      return `<div class="profile-post-placeholder"><i data-lucide="${label === "Reel" ? "clapperboard" : "image"}"></i><span>${label}</span></div>`;
    }

    function postStats(postId) {
      const interactions = getDB().postInteractions || [];
      return {
        likes: interactions.filter(item => item.postId === postId && item.type === "like").length,
        comments: interactions.filter(item => item.postId === postId && (item.type === "comment" || item.type === "reply")).length,
        shares: interactions.filter(item => item.postId === postId && item.type === "share").length,
        liked: interactions.some(item => item.postId === postId && item.type === "like" && item.from === getCurrentUser()?.name)
      };
    }

    function renderPostCard(profile, post) {
      const stats = postStats(post.id);
      return `<article class="profile-feed-card">
        <div class="profile-feed-head">
          ${avatarMarkup(profile, "user-avatar")}
          <div>
            <strong>${escapeHTML(post.author)}</strong>
            <small>${escapeHTML(post.date)} · ${escapeHTML(post.meta)}</small>
          </div>
          <button type="button" aria-label="More"><i data-lucide="more-horizontal"></i></button>
        </div>
        <h3>${escapeHTML(post.title)}</h3>
        <p>${escapeHTML(post.text)}</p>
        ${renderMediaBlock(post)}
        <div class="profile-tag-row">${(post.tags || []).filter(Boolean).slice(0, 5).map(tag => `<span>${escapeHTML(tag)}</span>`).join("")}</div>
        <div class="profile-social-actions">
          <button class="${stats.liked ? "active" : ""}" type="button" onclick="likeProfilePost('${jsArg(post.id)}', '${jsArg(post.owner)}')"><i data-lucide="thumbs-up"></i><span>${stats.likes || "Like"}</span></button>
          <button type="button" onclick="openProfileCommentDrawer('${jsArg(post.id)}', '${jsArg(post.owner)}')"><i data-lucide="message-circle"></i><span>${stats.comments || "Comment"}</span></button>
          <button type="button" onclick="shareProfilePost('${jsArg(post.id)}', '${jsArg(post.owner)}')"><i data-lucide="send"></i><span>${stats.shares || "Share"}</span></button>
        </div>
      </article>`;
    }

    function renderGrid(posts) {
      return posts.map(post => `<article class="profile-media-tile">${renderMediaBlock(post)}<strong>${escapeHTML(post.title)}</strong><small>${escapeHTML(mediaType(post))}</small></article>`).join("");
    }

    function render(profile) {
      const db = getDB();
      const startup = profile.startupId ? (db.startups || []).find(item => item.id === profile.startupId) : null;
      const reviews = (db.reviews || []).filter(review => review.to === profile.name);
      const posts = collectProfilePosts(profile, startup);
      activeProfileCache = profile;
      activeProfilePosts = posts;
      const avg = reviews.length ? (reviews.reduce((sum, review) => sum + Number(review.rating || 0), 0) / reviews.length).toFixed(1) : "New";
      const connections = (db.connections || []).filter(item => item.from === profile.name || item.to === profile.name).length;
      const location = [profile.city || startup?.city, profile.state || startup?.state].filter(Boolean).join(", ") || "India";
      const isOwnProfile = getCurrentUser()?.email && getCurrentUser().email === profile.email;
      document.title = `${profile.name} - Connect Hub`;
      document.getElementById("profileCard").innerHTML = `
        <header class="public-profile-topbar">
          <button type="button" onclick="history.length > 1 ? history.back() : location.href='index.html'" aria-label="Back"><i data-lucide="arrow-left"></i></button>
          <strong>${escapeHTML(profile.name)}</strong>
          <div>
            <button type="button" aria-label="Search"><i data-lucide="search"></i></button>
            ${isOwnProfile ? `<a href="${getDashboardUrl(profile.role)}" aria-label="Edit profile"><i data-lucide="pencil"></i></a>` : ""}
          </div>
        </header>

        <section class="public-profile-hero">
          <div class="profile-cover"></div>
          <div class="profile-main-card">
            <div class="profile-avatar-ring">${avatarMarkup(profile, "profile-hero-avatar")}</div>
            <div class="profile-name-row">
              <h1>${escapeHTML(profile.name)}</h1>
              <span>${escapeHTML(roleLabel(profile.role))}</span>
            </div>
            <p class="profile-title-line">${escapeHTML(detailLine(profile, startup))}</p>
            <p class="profile-bio">${escapeHTML(profile.bio || startup?.description || "Open to networking, partnerships, hiring, investment conversations, and growth opportunities.")}</p>
            <div class="profile-meta-line">
              <span><i data-lucide="map-pin"></i>${escapeHTML(location)}</span>
              <span><i data-lucide="briefcase-business"></i>${escapeHTML(startup?.sector || (profile.skills || []).slice(0, 2).join(", ") || profile.title || "Networking")}</span>
            </div>
            <div class="profile-stats-row">
              <div><strong>${posts.length}</strong><span>posts</span></div>
              <div><strong>${connections || Math.max(12, profile.completeness || 0)}</strong><span>network</span></div>
              <div><strong>${avg}</strong><span>rating</span></div>
            </div>
            <div class="profile-action-row">
              ${isOwnProfile
                ? `<a class="btn btn-primary" href="/profile/edit"><i data-lucide="pencil"></i>Edit Profile</a>`
                : `<button id="connectActionBtn" class="btn btn-primary connect-action-btn" data-name="${escapeHTML(profile.name)}" onclick="handleConnectAction(this)"><i data-lucide="user-plus"></i>Connect</button>`
              }
              <button class="btn btn-secondary" type="button" onclick="navigator.share ? navigator.share({ title: document.title, url: location.href }) : navigator.clipboard?.writeText(location.href)"><i data-lucide="share-2"></i>Share</button>
            </div>
          </div>
        </section>

        ${isOwnProfile ? `<section class="profile-info-card profile-post-composer">
          <h2>Create post</h2>
          <form onsubmit="submitProfilePost(event, '${profileId(profile)}')">
            <input id="profilePostTitle" class="form-control" placeholder="Post title" required>
            <textarea id="profilePostText" class="form-control" rows="3" maxlength="300" placeholder="Share a work update, offer, reel caption, or startup progress" required></textarea>
            <input id="profilePostTags" class="form-control" placeholder="Tags: design, hiring, funding">
            <div class="mobile-media-picker">
              <div class="media-picker-head">
                <strong>Photo or reel</strong>
                <span id="profileMediaName">No file selected</span>
              </div>
              <input id="profilePostMedia" type="file" accept="image/*,video/*" hidden onchange="previewProfilePostMedia(this, 'profilePostCamera')">
              <input id="profilePostCamera" type="file" accept="image/*,video/*" capture="environment" hidden onchange="previewProfilePostMedia(this, 'profilePostMedia')">
              <div class="media-picker-actions">
                <label for="profilePostMedia"><i data-lucide="images"></i><span>Gallery</span></label>
                <label for="profilePostCamera"><i data-lucide="camera"></i><span>Camera</span></label>
              </div>
              <div id="profileMediaPreview" class="media-preview-strip">
                <button type="button" onclick="document.getElementById('profilePostCamera')?.click()"><i data-lucide="camera"></i></button>
                <span>Open gallery or camera to add a photo/reel</span>
              </div>
            </div>
            <button class="btn btn-primary" type="submit"><i data-lucide="image-plus"></i>Post Photo/Reel</button>
          </form>
        </section>` : ""}

        <nav class="profile-tabs" aria-label="Profile sections">
          <span class="profile-tab-slider" aria-hidden="true"></span>
          <button class="active" type="button" data-profile-tab="all" data-target="feed">All</button>
          <button type="button" data-profile-tab="reels" data-target="media">Reels</button>
          <button type="button" data-profile-tab="photos" data-target="media">Photos</button>
          <button type="button" data-profile-tab="reviews" data-target="reviews">Reviews</button>
        </nav>

        <section class="profile-info-card">
          <div>
            <h2>Professional details</h2>
            <p>${escapeHTML(profile.role === "startup_admin" ? (startup?.description || profile.bio) : profile.bio || "Profile details are being updated.")}</p>
          </div>
          <div class="profile-detail-list">
            <span><i data-lucide="user-check"></i>${escapeHTML(roleLabel(profile.role))}</span>
            <span><i data-lucide="map-pin"></i>${escapeHTML(location)}</span>
            <span><i data-lucide="sparkles"></i>${escapeHTML((profile.skills || []).join(", ") || startup?.stage || profile.title || "Open to collaboration")}</span>
          </div>
        </section>

        <section id="media" class="profile-media-grid">${renderGrid(posts)}</section>

        <section id="feed" class="profile-feed-list">
          ${posts.map(post => renderPostCard(profile, post)).join("")}
        </section>

        <section id="reviews" class="profile-info-card">
          <h2>Reviews</h2>
          <div class="profile-review-list">
            ${reviews.map(review => `<article><strong>${escapeHTML(review.rating)}/5</strong><p>${escapeHTML(review.text || "Recommended on ConnectHub.")}</p><small>By ${escapeHTML(review.from)}</small></article>`).join("") || "<p>No reviews yet. Completed deals and collaborations will appear here.</p>"}
          </div>
        </section>
      `;
      installProfileMotion();
      if (window.lucide) window.lucide.createIcons();
    }

    function installProfileMotion() {
      document.documentElement.classList.add("profile-scroll-unlocked");
      document.body.classList.add("profile-motion-ready");
      const tabs = document.querySelector(".profile-tabs");
      const slider = tabs?.querySelector(".profile-tab-slider");
      const buttons = [...(tabs?.querySelectorAll("button[data-profile-tab]") || [])];
      const moveSlider = button => {
        if (!tabs || !slider || !button) return;
        const navRect = tabs.getBoundingClientRect();
        const buttonRect = button.getBoundingClientRect();
        slider.style.width = `${buttonRect.width}px`;
        slider.style.transform = `translate3d(${buttonRect.left - navRect.left + tabs.scrollLeft}px, 0, 0)`;
      };
      buttons.forEach(button => {
        button.addEventListener("click", () => {
          buttons.forEach(item => item.classList.remove("active"));
          button.classList.add("active");
          moveSlider(button);
          document.getElementById(button.dataset.target)?.scrollIntoView({ behavior: "smooth", block: "start" });
        });
      });
      requestAnimationFrame(() => moveSlider(buttons.find(button => button.classList.contains("active")) || buttons[0]));
      window.addEventListener("resize", () => moveSlider(buttons.find(button => button.classList.contains("active")) || buttons[0]), { passive: true });
      tabs?.addEventListener("scroll", () => moveSlider(buttons.find(button => button.classList.contains("active")) || buttons[0]), { passive: true });
    }

    async function submitProfilePost(event, profileKey) {
      event.preventDefault();
      const user = getCurrentUser();
      if (!user) return alert("Please login to publish a post.");
      let media = null;
      try {
        const galleryInput = document.getElementById("profilePostMedia");
        const cameraInput = document.getElementById("profilePostCamera");
        const selectedInput = galleryInput?.files?.length ? galleryInput : cameraInput;
        media = await fileToMedia(selectedInput);
      } catch (error) {
        alert(error.message);
        return;
      }
      const db = getDB();
      const post = {
        id: "pp-" + Date.now(),
        authorName: user.name,
        authorEmail: user.email,
        title: document.getElementById("profilePostTitle").value.trim(),
        description: document.getElementById("profilePostText").value.trim(),
        tags: document.getElementById("profilePostTags").value.split(",").map(tag => tag.trim()).filter(Boolean),
        media,
        mediaType: media?.type || "",
        postedDate: new Date().toLocaleDateString("en-IN", { day: "numeric", month: "short", year: "numeric" })
      };
      db.profilePosts.push(post);
      const connectedNames = new Set((db.connections || [])
        .filter(item => (item.status || "Accepted") !== "Declined" && (item.from === user.name || item.to === user.name))
        .map(item => item.from === user.name ? item.to : item.from)
        .filter(Boolean));
      connectedNames.forEach(name => {
        db.notifications.push({
          id: "not-" + Date.now() + "-" + name.replace(/[^a-z0-9]/gi, ""),
          to: name,
          type: "profile_post",
          from: user.name,
          text: `${user.name} shared a new ${media?.type?.startsWith("video/") ? "reel" : media ? "photo" : "post"}.`,
          targetUrl: `/profile/${encodeURIComponent(profileKey)}#feed`,
          read: false,
          createdAt: new Date().toISOString()
        });
      });
      saveDB(db);
      event.target.reset();
      resetProfilePostMedia();
      playProfileBell();
      const profile = getPublicProfiles().find(item => profileId(item) === profileKey) || user;
      render(profile);
    }

    function previewProfilePostMedia(input, otherInputId) {
      const otherInput = document.getElementById(otherInputId);
      if (otherInput && otherInput !== input) otherInput.value = "";
      const file = input.files?.[0];
      const name = document.getElementById("profileMediaName");
      const preview = document.getElementById("profileMediaPreview");
      if (!file || !preview) return resetProfilePostMedia();
      if (name) name.textContent = file.name;
      const url = URL.createObjectURL(file);
      const previewMedia = file.type.startsWith("video/")
        ? `<video src="${url}" muted playsinline></video>`
        : `<img src="${url}" alt="Selected media preview">`;
      preview.innerHTML = `${previewMedia}<span>${file.type.startsWith("video/") ? "Reel selected" : "Photo selected"}</span>`;
      if (window.lucide) window.lucide.createIcons();
    }

    function resetProfilePostMedia() {
      const name = document.getElementById("profileMediaName");
      const preview = document.getElementById("profileMediaPreview");
      if (name) name.textContent = "No file selected";
      if (preview) {
        preview.innerHTML = `<button type="button" onclick="document.getElementById('profilePostCamera')?.click()"><i data-lucide="camera"></i></button><span>Open gallery or camera to add a photo/reel</span>`;
      }
      if (window.lucide) window.lucide.createIcons();
    }

    function addInteraction(postId, ownerName, type, text = "") {
      const user = getCurrentUser();
      if (!user) return alert("Please login to interact with posts.");
      const db = getDB();
      db.postInteractions = db.postInteractions || [];
      if (type === "like") {
        const existing = db.postInteractions.find(item => item.postId === postId && item.type === "like" && item.from === user.name);
        if (existing) db.postInteractions = db.postInteractions.filter(item => item !== existing);
        else db.postInteractions.push({ id: `int-${Date.now()}`, postId, type, from: user.name, to: ownerName, createdAt: new Date().toISOString() });
      } else {
        db.postInteractions.push({ id: `int-${Date.now()}`, postId, type, from: user.name, to: ownerName, text, createdAt: new Date().toISOString() });
      }
      if (ownerName && ownerName !== user.name && (type !== "like" || db.postInteractions.some(item => item.postId === postId && item.type === "like" && item.from === user.name))) {
        db.notifications.push({
          id: "not-" + Date.now(),
          to: ownerName,
          type: `post_${type}`,
          from: user.name,
          text: `${user.name} ${type === "like" ? "liked" : type === "comment" ? "commented on" : "shared"} your post.`,
          targetUrl: location.pathname + location.search + "#feed",
          read: false,
          createdAt: new Date().toISOString()
        });
      }
      saveDB(db);
      playProfileBell();
      const id = new URLSearchParams(location.search).get("id") || "";
      const profile = getPublicProfiles().find(item => profileId(item) === normalizeProfileLookupId(id) || item.name === ownerName);
      if (profile) render(profile);
    }

    function likeProfilePost(postId, ownerName) {
      addInteraction(postId, ownerName, "like");
    }

    function profileByName(name) {
      const normalized = normalizeProfileLookupId(name);
      return getPublicProfiles().find(profile =>
        normalizeProfileLookupId(profile.name) === normalized ||
        normalizeProfileLookupId(profile.email) === normalized
      ) || { name, avatarInitials: initialsForName(name), role: "freelancer" };
    }

    function initialsForName(name) {
      return String(name || "CH")
        .trim()
        .split(/\s+/)
        .map(part => part[0])
        .join("")
        .slice(0, 2)
        .toUpperCase() || "CH";
    }

    function commentAvatar(name) {
      const profile = profileByName(name);
      return avatarMarkup(profile, "comment-avatar");
    }

    function getPostForComments(postId) {
      return activeProfilePosts.find(post => post.id === postId) || { title: "Profile post", text: "", owner: activeProfileCache?.name || "" };
    }

    function getCommentThreads(postId) {
      const interactions = getDB().postInteractions || [];
      return interactions
        .filter(item => item.postId === postId && item.type === "comment" && !item.parentId)
        .map(comment => ({
          ...comment,
          likes: interactions.filter(item => item.type === "comment_like" && item.commentId === comment.id).length,
          liked: interactions.some(item => item.type === "comment_like" && item.commentId === comment.id && item.from === getCurrentUser()?.name),
          replies: interactions.filter(item => item.postId === postId && item.type === "reply" && item.parentId === comment.id)
        }))
        .sort((a, b) => new Date(a.createdAt || 0) - new Date(b.createdAt || 0));
    }

    function timeAgo(value) {
      const date = new Date(value || Date.now());
      const seconds = Math.max(1, Math.floor((Date.now() - date.getTime()) / 1000));
      if (seconds < 60) return "now";
      const minutes = Math.floor(seconds / 60);
      if (minutes < 60) return `${minutes}m`;
      const hours = Math.floor(minutes / 60);
      if (hours < 24) return `${hours}h`;
      const days = Math.floor(hours / 24);
      return `${days}d`;
    }

    function renderReplyItem(reply) {
      return `<article class="comment-row comment-row-reply">
        ${commentAvatar(reply.from)}
        <div>
          <div class="comment-bubble">
            <strong>${escapeHTML(reply.from || "ConnectHub user")}</strong>
            <p>${escapeHTML(reply.text || "")}</p>
          </div>
          <div class="comment-actions"><span>${escapeHTML(timeAgo(reply.createdAt))}</span></div>
        </div>
      </article>`;
    }

    function renderCommentThread(thread, postId, ownerName) {
      return `<article class="comment-thread">
        <div class="comment-row">
          ${commentAvatar(thread.from)}
          <div>
            <div class="comment-bubble">
              <strong>${escapeHTML(thread.from || "ConnectHub user")}</strong>
              <p>${escapeHTML(thread.text || "")}</p>
            </div>
            <div class="comment-actions">
              <button type="button" class="${thread.liked ? "active" : ""}" onclick="likeProfileComment('${jsArg(thread.id)}', '${jsArg(postId)}', '${jsArg(ownerName)}')">${thread.likes ? `${thread.likes} Like` : "Like"}</button>
              <button type="button" onclick="toggleReplyComposer('${jsArg(thread.id)}')">Reply</button>
              <span>${escapeHTML(timeAgo(thread.createdAt))}</span>
            </div>
            <div class="comment-replies">${thread.replies.map(renderReplyItem).join("")}</div>
            <div id="replyComposer-${escapeAttr(thread.id)}" class="comment-reply-composer">
              ${commentAvatar(getCurrentUser()?.name || "You")}
              <input id="replyInput-${escapeAttr(thread.id)}" type="text" maxlength="240" placeholder="Reply to ${escapeAttr(thread.from || "comment")}..." onkeydown="if(event.key === 'Enter') submitProfileComment('${jsArg(postId)}', '${jsArg(ownerName)}', '${jsArg(thread.id)}')">
              <button type="button" onclick="submitProfileComment('${jsArg(postId)}', '${jsArg(ownerName)}', '${jsArg(thread.id)}')"><i data-lucide="send"></i></button>
            </div>
          </div>
        </div>
      </article>`;
    }

    function renderProfileCommentList(postId, ownerName) {
      const list = document.getElementById("profileCommentList");
      if (!list) return;
      const threads = getCommentThreads(postId);
      list.innerHTML = threads.length
        ? threads.map(thread => renderCommentThread(thread, postId, ownerName)).join("")
        : `<div class="comment-empty"><i data-lucide="message-circle"></i><strong>No comments yet</strong><p>Start the conversation with a useful note or question.</p></div>`;
      if (window.lucide) window.lucide.createIcons();
    }

    function openProfileCommentDrawer(postId, ownerName) {
      const post = getPostForComments(postId);
      let drawer = document.getElementById("profileCommentDrawer");
      if (!drawer) {
        drawer = document.createElement("section");
        drawer.id = "profileCommentDrawer";
        drawer.className = "profile-comment-overlay";
        document.body.appendChild(drawer);
      }
      drawer.innerHTML = `
        <button class="profile-comment-scrim" type="button" onclick="closeProfileCommentDrawer()" aria-label="Close comments"></button>
        <div class="profile-comment-panel" role="dialog" aria-modal="true" aria-label="Comments">
          <header class="profile-comment-header">
            <div>
              <span>Comments</span>
              <strong>${escapeHTML(post.title || "Profile post")}</strong>
            </div>
            <button type="button" onclick="closeProfileCommentDrawer()" aria-label="Close"><i data-lucide="x"></i></button>
          </header>
          <div class="profile-comment-post-preview">
            ${commentAvatar(post.owner || ownerName)}
            <p>${escapeHTML((post.text || "Profile update").slice(0, 150))}</p>
          </div>
          <div id="profileCommentList" class="profile-comment-list"></div>
          <div id="profileCommentTyping" class="comment-typing"><span></span><span></span><span></span><em>${escapeHTML(getCurrentUser()?.name || "You")} is typing</em></div>
          <footer class="profile-comment-composer">
            ${commentAvatar(getCurrentUser()?.name || "You")}
            <textarea id="profileCommentInput" rows="1" maxlength="240" placeholder="Write a comment..." oninput="handleCommentTyping()" onkeydown="if(event.key === 'Enter' && !event.shiftKey){ event.preventDefault(); submitProfileComment('${jsArg(postId)}', '${jsArg(ownerName)}'); }"></textarea>
            <button type="button" onclick="submitProfileComment('${jsArg(postId)}', '${jsArg(ownerName)}')" aria-label="Send comment"><i data-lucide="send"></i></button>
          </footer>
        </div>`;
      drawer.classList.add("active");
      renderProfileCommentList(postId, ownerName);
      requestAnimationFrame(() => document.getElementById("profileCommentInput")?.focus());
      if (window.lucide) window.lucide.createIcons();
    }

    function closeProfileCommentDrawer() {
      document.getElementById("profileCommentDrawer")?.classList.remove("active");
    }

    function handleCommentTyping() {
      const typing = document.getElementById("profileCommentTyping");
      if (!typing) return;
      typing.classList.add("active");
      clearTimeout(window.__profileCommentTypingTimer);
      window.__profileCommentTypingTimer = setTimeout(() => typing.classList.remove("active"), 1200);
    }

    function toggleReplyComposer(commentId) {
      document.querySelectorAll(".comment-reply-composer.active").forEach(node => {
        if (node.id !== `replyComposer-${commentId}`) node.classList.remove("active");
      });
      const composer = document.getElementById(`replyComposer-${commentId}`);
      composer?.classList.toggle("active");
      composer?.querySelector("input")?.focus();
    }

    function submitProfileComment(postId, ownerName, parentId = "") {
      const user = getCurrentUser();
      if (!user) return alert("Please login to comment.");
      const input = parentId ? document.getElementById(`replyInput-${parentId}`) : document.getElementById("profileCommentInput");
      const text = String(input?.value || "").trim().slice(0, 240);
      if (!text) return;
      const db = getDB();
      db.postInteractions = db.postInteractions || [];
      const parent = parentId ? db.postInteractions.find(item => item.id === parentId) : null;
      const targetName = parent?.from || ownerName;
      db.postInteractions.push({
        id: `int-${Date.now()}-${Math.random().toString(16).slice(2)}`,
        postId,
        type: parentId ? "reply" : "comment",
        parentId: parentId || "",
        from: user.name,
        to: targetName,
        text,
        createdAt: new Date().toISOString()
      });
      if (targetName && targetName !== user.name) {
        db.notifications = db.notifications || [];
        db.notifications.push({
          id: "not-" + Date.now(),
          to: targetName,
          type: parentId ? "post_reply" : "post_comment",
          from: user.name,
          text: `${user.name} ${parentId ? "replied to your comment" : "commented on your post"}.`,
          targetUrl: location.pathname + location.search + "#feed",
          read: false,
          createdAt: new Date().toISOString()
        });
      }
      saveDB(db);
      if (input) input.value = "";
      if (parentId) document.getElementById(`replyComposer-${parentId}`)?.classList.remove("active");
      playProfileBell();
      renderProfileCommentList(postId, ownerName);
    }

    function likeProfileComment(commentId, postId, ownerName) {
      const user = getCurrentUser();
      if (!user) return alert("Please login to like comments.");
      const db = getDB();
      db.postInteractions = db.postInteractions || [];
      const existing = db.postInteractions.find(item => item.type === "comment_like" && item.commentId === commentId && item.from === user.name);
      if (existing) db.postInteractions = db.postInteractions.filter(item => item !== existing);
      else {
        const comment = db.postInteractions.find(item => item.id === commentId);
        db.postInteractions.push({
          id: `int-${Date.now()}-${Math.random().toString(16).slice(2)}`,
          type: "comment_like",
          commentId,
          postId,
          from: user.name,
          to: comment?.from || ownerName,
          createdAt: new Date().toISOString()
        });
      }
      saveDB(db);
      renderProfileCommentList(postId, ownerName);
    }

    function shareProfilePost(postId, ownerName) {
      if (navigator.share) navigator.share({ title: document.title, url: location.href }).catch(() => {});
      else navigator.clipboard?.writeText(location.href);
      addInteraction(postId, ownerName, "share");
    }

    function findRequestedProfile() {
      const params = new URLSearchParams(location.search);
      const pathId = location.pathname.match(/\/profile\/([^/]+)\/?$/)?.[1] || "";
      const rawId = decodeURIComponent(pathId || params.get("id") || params.get("name") || "").toLowerCase();
      const normalizedId = normalizeProfileLookupId(rawId);
      return getPublicProfiles().find(item =>
        String(item.email || "").toLowerCase() === rawId ||
        profileId(item) === normalizedId ||
        normalizeProfileLookupId(item.email || item.name) === normalizedId ||
        String(item.name || "").toLowerCase() === rawId
      );
    }

    const instantProfile = findRequestedProfile();
    if (instantProfile) render(instantProfile);

    syncFromBackend().finally(() => {
      const profile = findRequestedProfile();
      if (profile) { render(profile); initConnectButton(profile); }
      else if (!instantProfile) document.getElementById("profileCard").innerHTML = '<section class="profile-info-card"><h1>Profile not found</h1><p>Open ConnectHub and search from Explore.</p><a class="btn btn-primary" href="index.html">Open app</a></section>';
    });

    function initConnectButton(profile) {
      const btn = document.getElementById('connectActionBtn');
      if (!btn) return;
      const name = encodeURIComponent(btn.dataset.name || profile.name);
      fetch('/api/connections/status/' + name)
        .then(r => r.json())
        .then(data => {
          if (data.success) renderConnectButton(btn, data.status, data.connectionId);
        })
        .catch(() => {});
    }

    function renderConnectButton(btn, status, connectionId) {
      if (status === 'none') {
        btn.innerHTML = '<i data-lucide="user-plus"></i>Connect';
        btn.className = 'btn btn-primary connect-action-btn';
        btn.onclick = function() { sendConnectRequest(this); };
      } else if (status === 'pending_sent') {
        btn.innerHTML = '<i data-lucide="clock"></i>Pending';
        btn.className = 'btn btn-secondary connect-action-btn pending';
        btn.onclick = null;
      } else if (status === 'pending_received') {
        btn.innerHTML = '<i data-lucide="user-check"></i>Accept Request';
        btn.className = 'btn btn-primary connect-action-btn';
        btn.onclick = function() { acceptConnectRequest(this, connectionId); };
      } else if (status === 'accepted') {
        btn.innerHTML = '<i data-lucide="check-circle"></i>Connected';
        btn.className = 'btn btn-secondary connect-action-btn connected';
        btn.onclick = function() { if (confirm("Remove this connection?")) removeConnection(connectionId, this); };
      }
      if (window.lucide) lucide.createIcons();
    }

    function handleConnectAction(btn) {
      const name = btn.dataset.name;
      if (!name) return;
      btn.innerHTML = 'Sending...';
      btn.disabled = true;
      fetch('/api/connections/request', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ to: name })
      })
        .then(r => r.json())
        .then(data => {
          if (data.success) { renderConnectButton(btn, 'pending_sent'); showToast('Request sent!'); }
          else { btn.innerHTML = '<i data-lucide="user-plus"></i>Connect'; btn.disabled = false; showToast(data.message || 'Failed'); }
        })
        .catch(() => { btn.innerHTML = '<i data-lucide="user-plus"></i>Connect'; btn.disabled = false; });
    }

    function sendConnectRequest(btn) {
      handleConnectAction(btn);
    }

    function acceptConnectRequest(btn, connectionId) {
      btn.innerHTML = 'Accepting...';
      fetch('/api/connections/accept/' + connectionId, { method: 'POST' })
        .then(r => r.json())
        .then(data => {
          if (data.success) { renderConnectButton(btn, 'accepted', connectionId); showToast('Connected!'); }
        })
        .catch(() => { btn.innerHTML = '<i data-lucide="user-check"></i>Accept'; });
    }

    function removeConnection(connectionId, btn) {
      fetch('/api/connections/' + connectionId, { method: 'DELETE' })
        .then(r => r.json())
        .then(data => {
          if (data.success) { renderConnectButton(btn, 'none'); showToast('Connection removed'); }
        })
        .catch(() => {});
    }

    function showToast(msg) {
      const t = document.createElement('div');
      t.className = 'toast-notification';
      t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 300); }, 2000);
    }
  </script>
<script src="/public/js/theme-system.js" defer></script>
</body>
