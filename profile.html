<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connect Hub Profile</title>
  <meta name="description" content="Public Connect Hub profile for Indian startups, freelancers, and investors.">
  <meta property="og:title" content="Connect Hub Profile">
  <meta property="og:description" content="View skills, sector, portfolio, media posts, reviews, and connect on Connect Hub India.">
  <meta property="og:type" content="profile">
  <meta property="og:image" content="assets/logo.png">
  <link rel="stylesheet" href="index.css">
</head>
<body class="public-profile-body">
  <main id="profileCard" class="public-profile-shell">Loading profile...</main>

  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="config.js"></script>
  <script src="db.js"></script>
  <script>
    const savedTheme = localStorage.getItem("connecthub_theme") || "light";
    document.documentElement.dataset.theme = savedTheme;
    document.body.classList.toggle("dark", savedTheme === "dark");

    function playProfileBell() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = "sine";
        osc.frequency.value = 1046;
        gain.gain.value = 0.028;
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start();
        gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.11);
        osc.stop(ctx.currentTime + 0.14);
      } catch {}
    }

    function roleLabel(role) {
      return role === "startup_admin" ? "Startup Owner" : role === "investor" ? "Investor" : "Freelancer";
    }

    function profileId(profile) {
      return String(profile.email || profile.name || "")
        .toLowerCase()
        .replace(/@.*/, "")
        .replace(/[^a-z0-9]+/g, "_")
        .replace(/^_|_$/g, "");
    }

    function escapeHTML(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function jsArg(value) {
      return String(value || "").replace(/\\/g, "\\\\").replace(/'/g, "\\'");
    }

    function detailLine(profile, startup) {
      const parts = [];
      if (profile.role === "freelancer") parts.push(profile.title || "Freelancer");
      if (profile.role === "startup_admin") parts.push(startup?.sector || profile.companyName || "Startup");
      if (profile.role === "investor") parts.push(profile.title || "Investor / Sponsor");
      const city = [profile.city || startup?.city, profile.state || startup?.state].filter(Boolean).join(", ");
      if (city) parts.push(city);
      return parts.join(" · ") || "ConnectHub India";
    }

    function mediaType(post) {
      const type = post.mediaType || post.media?.type || "";
      return type.startsWith("video/") ? "Reel" : post.media ? "Photo" : "Post";
    }

    function collectProfilePosts(profile, startup) {
      const db = getDB();
      const posts = [];
      (db.profilePosts || [])
        .filter(post => post.authorEmail === profile.email || post.authorName === profile.name)
        .forEach(post => posts.push({
          id: post.id,
          owner: profile.name,
          author: post.authorName,
          title: post.title || "Profile update",
          text: post.description || post.caption || "",
          meta: post.meta || roleLabel(profile.role),
          tags: post.tags || [],
          media: post.media,
          mediaType: post.mediaType,
          date: post.postedDate || "Recently",
          kind: "profile"
        }));
      (db.freelancerAds || [])
        .filter(ad => ad.freelancerName === profile.name)
        .forEach(ad => posts.push({
          id: `ad-${ad.id}`,
          owner: profile.name,
          author: profile.name,
          title: ad.title,
          text: ad.description,
          meta: `${ad.category || "Service"} · ${ad.price || "Custom quote"}`,
          tags: ad.tags || [],
          media: ad.media,
          mediaType: ad.mediaType,
          date: ad.appliedDate || "Recently",
          kind: "ad"
        }));
      (db.startupPromotions || [])
        .filter(post => post.startupName === (profile.companyName || startup?.name || profile.name))
        .forEach(post => posts.push({
          id: `promo-${post.id}`,
          owner: profile.name,
          author: post.startupName,
          title: post.title,
          text: post.description,
          meta: "Startup media update",
          tags: post.tags || [],
          media: post.media,
          mediaType: post.mediaType,
          date: post.postedDate || "Recently",
          kind: "promo"
        }));
      if (startup) {
        (db.jobs || [])
          .filter(job => job.startupId === startup.id)
          .forEach(job => posts.push({
            id: `job-${job.id}`,
            owner: profile.name,
            author: startup.name,
            title: job.title,
            text: job.description,
            meta: `Opportunity · Rs ${job.hourlyRate}/hr`,
            tags: job.tags || [],
            date: job.status || "Active",
            kind: "job"
          }));
      }
      if (!posts.length) {
        posts.push({
          id: `intro-${profileId(profile)}`,
          owner: profile.name,
          author: profile.name,
          title: `${roleLabel(profile.role)} profile`,
          text: profile.bio || "Open to meaningful business conversations, collaborations, deals, and partnerships on ConnectHub.",
          meta: detailLine(profile, startup),
          tags: profile.skills || [startup?.sector, profile.title].filter(Boolean),
          date: "Profile",
          kind: "intro"
        });
      }
      return posts;
    }

    function renderMediaBlock(post) {
      if (post.media) return renderMedia(post.media, post.mediaType);
      const label = mediaType(post);
      return `<div class="profile-post-placeholder"><i data-lucide="${label === "Reel" ? "clapperboard" : "image"}"></i><span>${label}</span></div>`;
    }

    function postStats(postId) {
      const interactions = getDB().postInteractions || [];
      return {
        likes: interactions.filter(item => item.postId === postId && item.type === "like").length,
        comments: interactions.filter(item => item.postId === postId && item.type === "comment").length,
        shares: interactions.filter(item => item.postId === postId && item.type === "share").length,
        liked: interactions.some(item => item.postId === postId && item.type === "like" && item.from === getCurrentUser()?.name)
      };
    }

    function renderPostCard(profile, post) {
      const stats = postStats(post.id);
      return `<article class="profile-feed-card">
        <div class="profile-feed-head">
          ${avatarMarkup(profile, "user-avatar")}
          <div>
            <strong>${escapeHTML(post.author)}</strong>
            <small>${escapeHTML(post.date)} · ${escapeHTML(post.meta)}</small>
          </div>
          <button type="button" aria-label="More"><i data-lucide="more-horizontal"></i></button>
        </div>
        <h3>${escapeHTML(post.title)}</h3>
        <p>${escapeHTML(post.text)}</p>
        ${renderMediaBlock(post)}
        <div class="profile-tag-row">${(post.tags || []).filter(Boolean).slice(0, 5).map(tag => `<span>${escapeHTML(tag)}</span>`).join("")}</div>
        <div class="profile-social-actions">
          <button class="${stats.liked ? "active" : ""}" type="button" onclick="likeProfilePost('${jsArg(post.id)}', '${jsArg(post.owner)}')"><i data-lucide="thumbs-up"></i><span>${stats.likes || "Like"}</span></button>
          <button type="button" onclick="commentProfilePost('${jsArg(post.id)}', '${jsArg(post.owner)}')"><i data-lucide="message-circle"></i><span>${stats.comments || "Comment"}</span></button>
          <button type="button" onclick="shareProfilePost('${jsArg(post.id)}', '${jsArg(post.owner)}')"><i data-lucide="send"></i><span>${stats.shares || "Share"}</span></button>
        </div>
      </article>`;
    }

    function renderGrid(posts) {
      return posts.map(post => `<article class="profile-media-tile">${renderMediaBlock(post)}<strong>${escapeHTML(post.title)}</strong><small>${escapeHTML(mediaType(post))}</small></article>`).join("");
    }

    function render(profile) {
      const db = getDB();
      const startup = profile.startupId ? (db.startups || []).find(item => item.id === profile.startupId) : null;
      const reviews = (db.reviews || []).filter(review => review.to === profile.name);
      const posts = collectProfilePosts(profile, startup);
      const avg = reviews.length ? (reviews.reduce((sum, review) => sum + Number(review.rating || 0), 0) / reviews.length).toFixed(1) : "New";
      const connections = (db.connections || []).filter(item => item.from === profile.name || item.to === profile.name).length;
      const location = [profile.city || startup?.city, profile.state || startup?.state].filter(Boolean).join(", ") || "India";
      const isOwnProfile = getCurrentUser()?.email && getCurrentUser().email === profile.email;
      document.title = `${profile.name} - Connect Hub`;
      document.getElementById("profileCard").innerHTML = `
        <header class="public-profile-topbar">
          <button type="button" onclick="history.length > 1 ? history.back() : location.href='index.html'" aria-label="Back"><i data-lucide="arrow-left"></i></button>
          <strong>${escapeHTML(profile.name)}</strong>
          <div>
            <button type="button" aria-label="Search"><i data-lucide="search"></i></button>
            ${isOwnProfile ? `<a href="${getDashboardUrl(profile.role)}" aria-label="Edit profile"><i data-lucide="pencil"></i></a>` : ""}
          </div>
        </header>

        <section class="public-profile-hero">
          <div class="profile-cover"></div>
          <div class="profile-main-card">
            <div class="profile-avatar-ring">${avatarMarkup(profile, "profile-hero-avatar")}</div>
            <div class="profile-name-row">
              <h1>${escapeHTML(profile.name)}</h1>
              <span>${escapeHTML(roleLabel(profile.role))}</span>
            </div>
            <p class="profile-title-line">${escapeHTML(detailLine(profile, startup))}</p>
            <p class="profile-bio">${escapeHTML(profile.bio || startup?.description || "Open to networking, partnerships, hiring, investment conversations, and growth opportunities.")}</p>
            <div class="profile-meta-line">
              <span><i data-lucide="map-pin"></i>${escapeHTML(location)}</span>
              <span><i data-lucide="briefcase-business"></i>${escapeHTML(startup?.sector || (profile.skills || []).slice(0, 2).join(", ") || profile.title || "Networking")}</span>
            </div>
            <div class="profile-stats-row">
              <div><strong>${posts.length}</strong><span>posts</span></div>
              <div><strong>${connections || Math.max(12, profile.completeness || 0)}</strong><span>network</span></div>
              <div><strong>${avg}</strong><span>rating</span></div>
            </div>
            <div class="profile-action-row">
              <a class="btn btn-primary" href="${getDashboardUrl(profile.role)}"><i data-lucide="${isOwnProfile ? "layout-dashboard" : "message-circle"}"></i>${isOwnProfile ? "Dashboard" : "Open App"}</a>
              <button class="btn btn-secondary" type="button" onclick="navigator.share ? navigator.share({ title: document.title, url: location.href }) : navigator.clipboard?.writeText(location.href)"><i data-lucide="share-2"></i>Share</button>
            </div>
          </div>
        </section>

        ${isOwnProfile ? `<section class="profile-info-card profile-post-composer">
          <h2>Create post</h2>
          <form onsubmit="submitProfilePost(event, '${profileId(profile)}')">
            <input id="profilePostTitle" class="form-control" placeholder="Post title" required>
            <textarea id="profilePostText" class="form-control" rows="3" maxlength="300" placeholder="Share a work update, offer, reel caption, or startup progress" required></textarea>
            <input id="profilePostTags" class="form-control" placeholder="Tags: design, hiring, funding">
            <div class="mobile-media-picker">
              <div class="media-picker-head">
                <strong>Photo or reel</strong>
                <span id="profileMediaName">No file selected</span>
              </div>
              <input id="profilePostMedia" type="file" accept="image/*,video/*" hidden onchange="previewProfilePostMedia(this, 'profilePostCamera')">
              <input id="profilePostCamera" type="file" accept="image/*,video/*" capture="environment" hidden onchange="previewProfilePostMedia(this, 'profilePostMedia')">
              <div class="media-picker-actions">
                <label for="profilePostMedia"><i data-lucide="images"></i><span>Gallery</span></label>
                <label for="profilePostCamera"><i data-lucide="camera"></i><span>Camera</span></label>
              </div>
              <div id="profileMediaPreview" class="media-preview-strip">
                <button type="button" onclick="document.getElementById('profilePostCamera')?.click()"><i data-lucide="camera"></i></button>
                <span>Open gallery or camera to add a photo/reel</span>
              </div>
            </div>
            <button class="btn btn-primary" type="submit"><i data-lucide="image-plus"></i>Post Photo/Reel</button>
          </form>
        </section>` : ""}

        <nav class="profile-tabs">
          <a href="#feed">All</a>
          <a href="#media">Reels</a>
          <a href="#media">Photos</a>
          <a href="#reviews">Reviews</a>
        </nav>

        <section class="profile-info-card">
          <div>
            <h2>Professional details</h2>
            <p>${escapeHTML(profile.role === "startup_admin" ? (startup?.description || profile.bio) : profile.bio || "Profile details are being updated.")}</p>
          </div>
          <div class="profile-detail-list">
            <span><i data-lucide="user-check"></i>${escapeHTML(roleLabel(profile.role))}</span>
            <span><i data-lucide="map-pin"></i>${escapeHTML(location)}</span>
            <span><i data-lucide="sparkles"></i>${escapeHTML((profile.skills || []).join(", ") || startup?.stage || profile.title || "Open to collaboration")}</span>
          </div>
        </section>

        <section id="media" class="profile-media-grid">${renderGrid(posts)}</section>

        <section id="feed" class="profile-feed-list">
          ${posts.map(post => renderPostCard(profile, post)).join("")}
        </section>

        <section id="reviews" class="profile-info-card">
          <h2>Reviews</h2>
          <div class="profile-review-list">
            ${reviews.map(review => `<article><strong>${escapeHTML(review.rating)}/5</strong><p>${escapeHTML(review.text || "Recommended on ConnectHub.")}</p><small>By ${escapeHTML(review.from)}</small></article>`).join("") || "<p>No reviews yet. Completed deals and collaborations will appear here.</p>"}
          </div>
        </section>
      `;
      if (window.lucide) window.lucide.createIcons();
    }

    async function submitProfilePost(event, profileKey) {
      event.preventDefault();
      const user = getCurrentUser();
      if (!user) return alert("Please login to publish a post.");
      let media = null;
      try {
        const galleryInput = document.getElementById("profilePostMedia");
        const cameraInput = document.getElementById("profilePostCamera");
        const selectedInput = galleryInput?.files?.length ? galleryInput : cameraInput;
        media = await fileToMedia(selectedInput);
      } catch (error) {
        alert(error.message);
        return;
      }
      const db = getDB();
      const post = {
        id: "pp-" + Date.now(),
        authorName: user.name,
        authorEmail: user.email,
        title: document.getElementById("profilePostTitle").value.trim(),
        description: document.getElementById("profilePostText").value.trim(),
        tags: document.getElementById("profilePostTags").value.split(",").map(tag => tag.trim()).filter(Boolean),
        media,
        mediaType: media?.type || "",
        postedDate: new Date().toLocaleDateString("en-IN", { day: "numeric", month: "short", year: "numeric" })
      };
      db.profilePosts.push(post);
      const connectedNames = new Set((db.connections || [])
        .filter(item => (item.status || "Accepted") !== "Declined" && (item.from === user.name || item.to === user.name))
        .map(item => item.from === user.name ? item.to : item.from)
        .filter(Boolean));
      connectedNames.forEach(name => {
        db.notifications.push({
          id: "not-" + Date.now() + "-" + name.replace(/[^a-z0-9]/gi, ""),
          to: name,
          type: "profile_post",
          from: user.name,
          text: `${user.name} shared a new ${media?.type?.startsWith("video/") ? "reel" : media ? "photo" : "post"}.`,
          targetUrl: `/profile/${encodeURIComponent(profileKey)}#feed`,
          read: false,
          createdAt: new Date().toISOString()
        });
      });
      saveDB(db);
      event.target.reset();
      resetProfilePostMedia();
      playProfileBell();
      const profile = getAllProfiles().find(item => profileId(item) === profileKey) || user;
      render(profile);
    }

    function previewProfilePostMedia(input, otherInputId) {
      const otherInput = document.getElementById(otherInputId);
      if (otherInput && otherInput !== input) otherInput.value = "";
      const file = input.files?.[0];
      const name = document.getElementById("profileMediaName");
      const preview = document.getElementById("profileMediaPreview");
      if (!file || !preview) return resetProfilePostMedia();
      if (name) name.textContent = file.name;
      const url = URL.createObjectURL(file);
      const previewMedia = file.type.startsWith("video/")
        ? `<video src="${url}" muted playsinline></video>`
        : `<img src="${url}" alt="Selected media preview">`;
      preview.innerHTML = `${previewMedia}<span>${file.type.startsWith("video/") ? "Reel selected" : "Photo selected"}</span>`;
      if (window.lucide) window.lucide.createIcons();
    }

    function resetProfilePostMedia() {
      const name = document.getElementById("profileMediaName");
      const preview = document.getElementById("profileMediaPreview");
      if (name) name.textContent = "No file selected";
      if (preview) {
        preview.innerHTML = `<button type="button" onclick="document.getElementById('profilePostCamera')?.click()"><i data-lucide="camera"></i></button><span>Open gallery or camera to add a photo/reel</span>`;
      }
      if (window.lucide) window.lucide.createIcons();
    }

    function addInteraction(postId, ownerName, type, text = "") {
      const user = getCurrentUser();
      if (!user) return alert("Please login to interact with posts.");
      const db = getDB();
      db.postInteractions = db.postInteractions || [];
      if (type === "like") {
        const existing = db.postInteractions.find(item => item.postId === postId && item.type === "like" && item.from === user.name);
        if (existing) db.postInteractions = db.postInteractions.filter(item => item !== existing);
        else db.postInteractions.push({ id: `int-${Date.now()}`, postId, type, from: user.name, to: ownerName, createdAt: new Date().toISOString() });
      } else {
        db.postInteractions.push({ id: `int-${Date.now()}`, postId, type, from: user.name, to: ownerName, text, createdAt: new Date().toISOString() });
      }
      if (ownerName && ownerName !== user.name && (type !== "like" || db.postInteractions.some(item => item.postId === postId && item.type === "like" && item.from === user.name))) {
        db.notifications.push({
          id: "not-" + Date.now(),
          to: ownerName,
          type: `post_${type}`,
          from: user.name,
          text: `${user.name} ${type === "like" ? "liked" : type === "comment" ? "commented on" : "shared"} your post.`,
          targetUrl: location.pathname + location.search + "#feed",
          read: false,
          createdAt: new Date().toISOString()
        });
      }
      saveDB(db);
      playProfileBell();
      const id = new URLSearchParams(location.search).get("id") || "";
      const profile = getAllProfiles().find(item => profileId(item) === id || item.name === ownerName);
      if (profile) render(profile);
    }

    function likeProfilePost(postId, ownerName) {
      addInteraction(postId, ownerName, "like");
    }

    function commentProfilePost(postId, ownerName) {
      const text = prompt("Write a comment");
      if (!text) return;
      addInteraction(postId, ownerName, "comment", text.slice(0, 240));
    }

    function shareProfilePost(postId, ownerName) {
      if (navigator.share) navigator.share({ title: document.title, url: location.href }).catch(() => {});
      else navigator.clipboard?.writeText(location.href);
      addInteraction(postId, ownerName, "share");
    }

    syncFromBackend().finally(() => {
      const params = new URLSearchParams(location.search);
      const pathId = location.pathname.match(/\/profile\/([^/]+)\/?$/)?.[1] || "";
      const id = decodeURIComponent(pathId || params.get("id") || params.get("name") || "").toLowerCase();
      const profile = getAllProfiles().find(item =>
        String(item.email || "").toLowerCase() === id ||
        profileId(item) === id ||
        String(item.name || "").toLowerCase() === id
      );
      if (profile) render(profile);
      else document.getElementById("profileCard").innerHTML = '<section class="profile-info-card"><h1>Profile not found</h1><p>Open ConnectHub and search from Explore.</p><a class="btn btn-primary" href="index.html">Open app</a></section>';
    });
  </script>
</body>
</html>
