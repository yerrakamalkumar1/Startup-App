<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ConnectHub India</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0d7377">
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useMemo, useState } = React;
    const brand = "#0d7377";

    const users = [
      { id:"kamaldev", name:"Kamal Kumar", role:"Full Stack Freelancer", city:"Hyderabad", state:"Telangana", avatar:"https://images.unsplash.com/photo-1500648767791-00dcc994a43e?auto=format&fit=crop&w=180&q=80", verified:true, online:true, followers:"12.4K", following:824, posts:38, bio:"Building clean web apps, startup dashboards, and mobile-first product experiences for Indian founders." },
      { id:"nexalocal", name:"NexaLocal Commerce", role:"Startup", city:"Bengaluru", state:"Karnataka", avatar:"https://images.unsplash.com/photo-1556761175-b413da4baf72?auto=format&fit=crop&w=180&q=80", verified:true, online:true, followers:"8.7K", following:312, posts:24, bio:"Local commerce startup connecting operators, creators, and growth partners across India." },
      { id:"ananyafund", name:"Ananya Sen", role:"Angel Investor", city:"Mumbai", state:"Maharashtra", avatar:"https://images.unsplash.com/photo-1494790108377-be9c29b29330?auto=format&fit=crop&w=180&q=80", verified:true, online:false, followers:"21K", following:540, posts:42, bio:"Backing early Indian startups in SaaS, local commerce, logistics, and creative-led growth." },
      { id:"priyadesign", name:"Priya Singh", role:"Brand Designer", city:"Pune", state:"Maharashtra", avatar:"https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&w=180&q=80", verified:false, online:true, followers:"6.1K", following:428, posts:19, bio:"Brand kits, pitch decks, launch creatives, and reels for growing startup teams." },
      { id:"urbanops", name:"UrbanOps Labs", role:"Startup", city:"Delhi", state:"Delhi", avatar:"https://images.unsplash.com/photo-1497366754035-f200968a6e72?auto=format&fit=crop&w=180&q=80", verified:false, online:false, followers:"3.8K", following:190, posts:16, bio:"Operations tools and creator-powered local business growth systems." },
      { id:"rahulgrowth", name:"Rahul Mehta", role:"Growth Marketer", city:"Chennai", state:"Tamil Nadu", avatar:"https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?auto=format&fit=crop&w=180&q=80", verified:false, online:true, followers:"9.2K", following:677, posts:31, bio:"Performance campaigns, lead funnels, and WhatsApp growth systems for Indian startups." }
    ];

    const feedPosts = [
      { id:1, user:users[0], time:"12m", text:"Finished a mobile-first service marketplace dashboard today. Clean navigation, fast profile editing, and better discovery matter more than extra noise.", likes:124, comments:18, shares:9 },
      { id:2, user:users[1], time:"36m", text:"Looking for freelance video editors and launch designers for a new campaign across tier-2 Indian cities.", likes:298, comments:42, shares:31 },
      { id:3, user:users[2], time:"1h", text:"Founder profiles with clear location, traction, and specific asks get faster investor replies.", likes:412, comments:55, shares:48 },
      { id:4, user:users[3], time:"3h", text:"A good launch kit needs a sharp offer, repeatable visual system, and short proof-of-work reels.", likes:176, comments:22, shares:14 }
    ];

    const conversationsSeed = [
      { id:"c1", user:users[1], last:"Can you share your portfolio and pricing?", time:"2m", unread:2, messages:[{from:"them", text:"Hey Kamal, we saw your dashboard work."},{from:"them", text:"Can you share your portfolio and pricing?"},{from:"me", text:"Yes, I can send a short plan today."}] },
      { id:"c2", user:users[2], last:"Your ConnectHub idea has potential.", time:"18m", unread:1, messages:[{from:"them", text:"Your ConnectHub idea has potential."},{from:"me", text:"Thank you. I am improving the marketplace flow now."}] },
      { id:"c3", user:users[3], last:"I can design the brand kit this week.", time:"1h", unread:0, messages:[{from:"me", text:"Can you help with startup ad creatives?"},{from:"them", text:"I can design the brand kit this week."}] }
    ];

    function initials(name) {
      return name.split(" ").map(part => part[0]).join("").slice(0, 2).toUpperCase();
    }

    function Avatar({ user, size = 46, ring = false, online = false }) {
      return (
        <div className={ring ? "avatarRing" : "avatarWrap"} style={{ width:size, height:size }}>
          <div className="avatar" style={{ width:size - (ring ? 6 : 0), height:size - (ring ? 6 : 0) }}>
            {user.avatar ? <img src={user.avatar} alt={user.name} /> : <span>{initials(user.name)}</span>}
          </div>
          {online && <span className={`onlineDot ${user.online ? "on" : ""}`} />}
        </div>
      );
    }

    function Header({ title, showBack, onBack }) {
      return (
        <header className="topHeader">
          <button className="iconBtn" aria-label="Menu">☰</button>
          <button className="iconBtn back" aria-label="Back" onClick={onBack}>{showBack ? "‹" : ""}</button>
          <h1>{title}</h1>
          <span className="rolePill">Freelancer</span>
        </header>
      );
    }

    function Home() {
      return (
        <main className="screenBody">
          <section className="stories">
            {users.map(user => (
              <button className="story" key={user.id}>
                <Avatar user={user} size={62} ring />
                <span>{user.name.split(" ")[0]}</span>
              </button>
            ))}
          </section>
          <section className="feed">
            {feedPosts.map(post => (
              <article className="postCard" key={post.id}>
                <div className="postHead">
                  <Avatar user={post.user} />
                  <div>
                    <div className="nameLine">
                      <strong>{post.user.name}</strong>
                      {post.user.verified && <span className="verified">✓</span>}
                    </div>
                    <p>{post.user.role} · {post.time}</p>
                  </div>
                </div>
                <p className="postText">{post.text}</p>
                <div className="postActions">
                  <button>♡ {post.likes}</button>
                  <button>💬 {post.comments}</button>
                  <button>↗ {post.shares}</button>
                </div>
              </article>
            ))}
          </section>
        </main>
      );
    }

    function Explore({ onOpenProfile }) {
      const [query, setQuery] = useState("");
      const filtered = useMemo(() => {
        const q = query.toLowerCase();
        return users.filter(user => user.name.toLowerCase().includes(q) || user.id.toLowerCase().includes(q) || user.role.toLowerCase().includes(q));
      }, [query]);
      return (
        <main className="screenBody exploreScreen">
          <div className="stickySearch">
            <input value={query} onChange={e => setQuery(e.target.value)} placeholder="Search name, @id, or role" />
          </div>
          <div className="avatarGrid">
            {filtered.map(user => (
              <button key={user.id} className="gridUser" onClick={() => onOpenProfile(user)}>
                <Avatar user={user} size={104} />
                <span>{user.name}</span>
                <small>@{user.id}</small>
              </button>
            ))}
          </div>
        </main>
      );
    }

    function FullProfile({ user, onMessage }) {
      return (
        <main className="screenBody profileView">
          <div className="profileHero">
            <Avatar user={user} size={92} />
            <div className="profileStats">
              <strong>{user.posts}</strong><span>Posts</span>
              <strong>{user.followers}</strong><span>Followers</span>
              <strong>{user.following}</strong><span>Following</span>
            </div>
          </div>
          <h2>{user.name} {user.verified && <span className="verified">✓</span>}</h2>
          <p className="muted">@{user.id} · {user.role} · {user.city}</p>
          <p className="bio">{user.bio}</p>
          <div className="profileActions">
            <button className="primaryBtn">Follow</button>
            <button className="secondaryBtn" onClick={onMessage}>Message</button>
          </div>
          <div className="postGrid">
            {Array.from({ length:9 }).map((_, index) => <div className="miniPost" key={index}>{index + 1}</div>)}
          </div>
        </main>
      );
    }

    function Messages({ conversations, setConversations, openChat, setOpenChat }) {
      const [query, setQuery] = useState("");
      const [draft, setDraft] = useState("");
      const chat = conversations.find(item => item.id === openChat);

      if (chat) {
        const send = () => {
          if (!draft.trim()) return;
          setConversations(prev => prev.map(item => item.id === chat.id ? { ...item, last:draft, time:"now", messages:[...item.messages, { from:"me", text:draft }] } : item));
          setDraft("");
        };
        return (
          <main className="screenBody chatScreen">
            <div className="chatHeader">
              <Avatar user={chat.user} size={42} online />
              <div><strong>{chat.user.name}</strong><p>{chat.user.online ? "Online" : "Offline"} · @{chat.user.id}</p></div>
            </div>
            <div className="chatBubbles">
              {chat.messages.map((message, index) => <div key={index} className={`bubble ${message.from === "me" ? "sent" : "received"}`}>{message.text}</div>)}
            </div>
            <div className="chatInput">
              <input value={draft} onChange={e => setDraft(e.target.value)} placeholder="Message..." />
              <button onClick={send}>Send</button>
            </div>
          </main>
        );
      }

      const filtered = conversations.filter(item => item.user.name.toLowerCase().includes(query.toLowerCase()) || item.user.id.toLowerCase().includes(query.toLowerCase()));
      return (
        <main className="screenBody inboxScreen">
          <div className="stickySearch"><input value={query} onChange={e => setQuery(e.target.value)} placeholder="Search messages" /></div>
          <div className="conversationList">
            {filtered.map(item => (
              <button key={item.id} className="conversation" onClick={() => setOpenChat(item.id)}>
                <Avatar user={item.user} size={54} online />
                <div className="conversationText"><strong>{item.user.name}</strong><small>@{item.user.id}</small><p>{item.last}</p></div>
                <div className="conversationMeta"><span>{item.time}</span>{item.unread > 0 && <b>{item.unread}</b>}</div>
              </button>
            ))}
          </div>
          <button className="newMessageBtn">New Message</button>
        </main>
      );
    }

    function Ads() {
      return (
        <main className="screenBody">
          <section className="chainCard">
            <h2>Service ads chain system</h2>
            <p>Freelancers post service ads here. Startups discover them in Explore and can contact, message, or hire directly.</p>
          </section>
          <button className="primaryBtn wide">+ New Ad</button>
          <section className="emptyCard"><h3>No ads yet</h3><p>Create your first service ad to appear in startup discovery.</p></section>
        </main>
      );
    }

    function Profile({ dark, setDark }) {
      const [saved, setSaved] = useState(false);
      const [bio, setBio] = useState("Building mobile-first apps for Indian startups.");
      const save = () => {
        setSaved(true);
        setTimeout(() => setSaved(false), 1800);
      };
      return (
        <main className="screenBody">
          <div className="profileTabHeader">
            <h2>Edit Profile</h2>
            <button className="modeToggle" onClick={() => setDark(!dark)}>{dark ? "Light" : "Dark"}</button>
          </div>
          <section className="editCard">
            <div className="progressTop"><span>Profile 60% complete</span><div><i style={{ width:"60%" }} /></div></div>
            <div className="editAvatar"><Avatar user={users[0]} size={92} /><span>✎</span></div>
            <label>Full Name<input defaultValue="Kamal Kumar" /></label>
            <label>Bio / Short Pitch<textarea maxLength={200} value={bio} onChange={e => setBio(e.target.value)} /></label>
            <small className="charCount">{bio.length}/200</small>
            <div className="twoCols">
              <label>City<input defaultValue="Hyderabad" /></label>
              <label>State<input defaultValue="Telangana" /></label>
            </div>
            <div className="inlineActions">
              <button className="secondaryBtn">Use Location</button>
              <button className={`saveBtn ${saved ? "saved" : ""}`} onClick={save}>{saved ? "✓ Saved" : "Save Profile"}</button>
            </div>
          </section>
          <footer className="profileFooter"><p>Support: <strong>6301394850</strong></p><a>Privacy</a><a>Terms</a></footer>
        </main>
      );
    }

    function App() {
      const [tab, setTab] = useState("Home");
      const [profileUser, setProfileUser] = useState(null);
      const [openChat, setOpenChat] = useState(null);
      const [conversations, setConversations] = useState(conversationsSeed);
      const [dark, setDark] = useState(false);
      const title = profileUser ? profileUser.name : openChat ? "Messages" : tab;
      const showBack = Boolean(profileUser || openChat);
      const goBack = () => { if (profileUser) setProfileUser(null); if (openChat) setOpenChat(null); };
      const openMessageFor = user => {
        setProfileUser(null);
        setTab("Messages");
        const convo = conversations.find(item => item.user.id === user.id) || conversations[0];
        setOpenChat(convo.id);
      };
      return (
        <div className={`page ${dark ? "dark" : ""}`}>
          <div className="phone">
            <Header title={title} showBack={showBack} onBack={goBack} />
            {profileUser ? <FullProfile user={profileUser} onMessage={() => openMessageFor(profileUser)} /> :
              tab === "Home" ? <Home /> :
              tab === "Explore" ? <Explore onOpenProfile={setProfileUser} /> :
              tab === "Messages" ? <Messages conversations={conversations} setConversations={setConversations} openChat={openChat} setOpenChat={setOpenChat} /> :
              tab === "Ads" ? <Ads /> :
              <Profile dark={dark} setDark={setDark} />}
            {!profileUser && !openChat && (
              <nav className="bottomNav">
                {["Home","Explore","Messages","Ads","Profile"].map(item => (
                  <button key={item} className={tab === item ? "active" : ""} onClick={() => setTab(item)}>
                    <span>{item === "Home" ? "⌂" : item === "Explore" ? "⌕" : item === "Messages" ? "◌" : item === "Ads" ? "▣" : "◉"}</span>{item}
                  </button>
                ))}
              </nav>
            )}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&display=swap');

isplay:grid;grid-template-columns:repeat(3,1fr);gap:4px;margin-top:16px}.miniPost{aspect-ratio:1;background:linear-gradient(135deg,#d9f2f2,#eef6f7);border-radius:8px;display:grid;place-items:center;color:#0d7377;font-weight:900}.conversationList{display:grid;gap:4px}.conversation{display:grid;grid-template-columns:auto 1fr auto;gap:10px;align-items:center;border:0;background:transparent;color:inherit;text-align:left;padding:10px 0}.conversationText strong,.conversationText small,.conversationText p{display:block}.conversationText small,.conversationText p,.conversationMeta span{color:#667085;font-size:12px;margin:1px 0}.conversationMeta{text-align:right}.conversationMeta b{display:inline-grid;place-items:center;background:#0d7377;color:#fff;border-radius:99px;min-width:20px;height:20px;font-size:11px}.newMessageBtn{width:100%;margin-top:16px;background:#0d7377;color:#fff}.chatScreen{display:flex;flex-direction:column;height:calc(100% - 62px)}.chatHeader{display:flex;gap:10px;align-items:center;padding-bottom:12px;border-bottom:1px solid #edf2f7}.chatHeader p{margin:1px 0;color:#667085;font-size:12px}.chatBubbles{flex:1;display:flex;flex-direction:column;gap:8px;padding:14px 0;overflow:auto}.bubble{max-width:78%;padding:11px 13px;border-radius:17px;font-size:14px;line-height:1.35}.sent{align-self:flex-end;background:#0d7377;color:#fff;border-bottom-right-radius:5px}.received{align-self:flex-start;background:#eef2f6;color:#1f2937;border-bottom-left-radius:5px}.chatInput{display:grid;grid-template-columns:1fr auto;gap:8px}.chatInput button{border:0;border-radius:14px;background:#0d7377;color:#fff;font-weight:900;padding:0 14px}.chainCard{border-left:5px solid #0d7377}.chainCard h2,.emptyCard h3{margin:0 0 6px}.chainCard p,.emptyCard p{margin:0;color:#667085;line-height:1.45}.emptyCard{text-align:center;margin-top:14px;padding:28px 14px}.profileTabHeader{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}.profileTabHeader h2{margin:0}.modeToggle{border:1px solid #d9e2e7;border-radius:999px;background:#fff;padding:8px 12px;font-weight:800;color:#0d7377}.progressTop span{font-size:13px;font-weight:900}.progressTop div{height:8px;background:#e6edf2;border-radius:999px;margin:8px 0 16px;overflow:hidden}.progressTop i{display:block;height:100%;background:#0d7377;border-radius:inherit}.editAvatar{width:max-content;margin:0 auto 16px;position:relative}.editAvatar>span{position:absolute;right:0;bottom:0;background:#0d7377;color:#fff;border-radius:50%;width:28px;height:28px;display:grid;place-items:center;border:3px solid #fff}label{display:grid;gap:6px;font-size:13px;font-weight:900;margin-bottom:12px}label textarea{min-height:92px;resize:none}.charCount{display:block;text-align:right;color:#667085;margin-top:-8px;margin-bottom:10px}.twoCols{display:grid;grid-template-columns:1fr 1fr;gap:10px}.saveBtn.saved{background:#16a34a}.profileFooter{text-align:center;color:#667085;font-size:13px;margin-top:18px}.profileFooter a{margin:0 10px;color:#0d7377;font-weight:900}.bottomNav{position:absolute;left:0;right:0;bottom:0;height:76px;display:grid;grid-template-columns:repeat(5,1fr);background:#fff;border-top:1px solid #edf2f7;padding:8px 6px 10px}.dark .bottomNav{background:#101828;border-color:#263247}.bottomNav button{border:0;background:transparent;color:#667085;font-size:11px;font-weight:900;display:grid;gap:2px;place-items:center}.bottomNav button span{font-size:20px}.bottomNav button.active{color:#0d7377}@media(max-width:520px){.page{padding:0}.phone{width:100vw;height:100vh;border:0;border-radius:0}.screenBody{height:calc(100vh - 62px - 76px)}}

</body>
