<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connect Hub Admin</title>
  <meta name="robots" content="noindex">
  <link rel="stylesheet" href="index.css">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
  <main class="min-h-screen bg-slate-50 p-4 text-slate-900">
    <section class="mx-auto max-w-6xl">
      <div class="mb-4 flex flex-wrap items-center justify-between gap-3">
        <div>
          <h1 class="text-2xl font-extrabold text-teal-800">Connect Hub Admin</h1>
          <p class="text-sm text-slate-600">Manage users, posts, messages, connections, interests, and reviews.</p>
        </div>
        <a class="rounded-lg bg-teal-700 px-4 py-2 text-sm font-bold text-white" href="index.html">Back to app</a>
      </div>
      <div id="adminStatus" class="rounded-xl border border-slate-200 bg-white p-4 shadow-sm">Loading admin data...</div>
      <section class="mt-4 rounded-xl border border-slate-200 bg-white p-4 shadow-sm">
        <div class="flex flex-wrap items-start justify-between gap-3">
          <div>
            <h2 class="text-lg font-extrabold text-slate-900">Registration Location Lookup</h2>
            <p class="text-sm text-slate-600">Admin-only lookup for a user's registration IP and approximate IP geolocation. Every lookup is audit logged.</p>
          </div>
          <span class="rounded-full bg-teal-50 px-3 py-1 text-xs font-bold text-teal-700">Private admin tool</span>
        </div>
        <div class="mt-4 flex flex-col gap-2 sm:flex-row">
          <input id="registrationLookupInput" class="min-w-0 flex-1 rounded-lg border border-slate-200 px-3 py-2 text-sm outline-none focus:border-teal-600 focus:ring-2 focus:ring-teal-100" value="aarohi" placeholder="Username, handle, name, or email">
          <button id="registrationLookupBtn" class="rounded-lg bg-teal-700 px-4 py-2 text-sm font-bold text-white hover:bg-teal-600" type="button">Lookup</button>
        </div>
        <div id="registrationLookupResult" class="mt-3 hidden rounded-lg border border-slate-200 bg-slate-50 p-3 text-sm"></div>
      </section>
      <div id="adminCounts" class="mt-4 grid gap-3 sm:grid-cols-2 lg:grid-cols-4"></div>
      <div id="adminTables" class="mt-4 grid gap-4 lg:grid-cols-2"></div>
    </section>
  </main>
  <script src="config.js"></script>
  <script src="db.js"></script>
  <script>
    function table(title, rows, columns) {
      return `<section class="overflow-hidden rounded-xl border border-slate-200 bg-white shadow-sm">
        <h2 class="border-b border-slate-100 px-4 py-3 font-extrabold text-slate-800">${title}</h2>
        <div class="overflow-x-auto"><table class="min-w-full text-left text-sm">
          <thead class="bg-slate-50 text-xs uppercase text-slate-500"><tr>${columns.map(col => `<th class="px-4 py-2">${col.label}</th>`).join("")}</tr></thead>
          <tbody>${rows.slice(-20).reverse().map(row => `<tr class="border-t border-slate-100">${columns.map(col => `<td class="px-4 py-2">${row[col.key] || ""}</td>`).join("")}</tr>`).join("") || `<tr><td class="px-4 py-6 text-center text-slate-500" colspan="${columns.length}">No records</td></tr>`}</tbody>
        </table></div>
      </section>`;
    }

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    async function lookupRegistrationLocation() {
      const input = document.getElementById("registrationLookupInput");
      const button = document.getElementById("registrationLookupBtn");
      const result = document.getElementById("registrationLookupResult");
      const identifier = input.value.trim();
      if (!identifier) {
        result.className = "mt-3 rounded-lg border border-red-200 bg-red-50 p-3 text-sm text-red-700";
        result.textContent = "Enter a username, handle, name, or email.";
        return;
      }
      button.disabled = true;
      button.textContent = "Checking...";
      result.className = "mt-3 rounded-lg border border-slate-200 bg-slate-50 p-3 text-sm text-slate-600";
      result.textContent = "Looking up registration IP and geolocation...";
      try {
        const data = await apiRequest(`/api/admin/users/${encodeURIComponent(identifier)}/registration-location`);
        const geo = data.geolocation || {};
        const location = [geo.city, geo.region, geo.country].filter(Boolean).join(", ") || "Unknown location";
        result.className = "mt-3 rounded-lg border border-teal-100 bg-teal-50 p-3 text-sm text-slate-800";
        result.innerHTML = `
          <div class="grid gap-2 sm:grid-cols-2">
            <div><span class="block text-xs font-bold uppercase text-slate-500">User</span><strong>${escapeHtml(data.user?.name || "")}</strong> <span class="text-slate-500">@${escapeHtml(data.user?.username || "")}</span></div>
            <div><span class="block text-xs font-bold uppercase text-slate-500">Role</span>${escapeHtml(data.user?.role || "")}</div>
            <div><span class="block text-xs font-bold uppercase text-slate-500">IP Source</span>${escapeHtml(data.registration?.source || "")}</div>
            <div><span class="block text-xs font-bold uppercase text-slate-500">Registered At</span>${escapeHtml(data.registration?.registeredAt || "Not stored")}</div>
            <div><span class="block text-xs font-bold uppercase text-slate-500">Registration IP</span><code>${escapeHtml(data.registration?.ipAddress || "Not stored")}</code></div>
            <div><span class="block text-xs font-bold uppercase text-slate-500">Approx Location</span>${escapeHtml(location)}</div>
            <div><span class="block text-xs font-bold uppercase text-slate-500">Coordinates</span>${geo.latitude ?? ""}${geo.latitude != null && geo.longitude != null ? ", " : ""}${geo.longitude ?? ""}</div>
            <div><span class="block text-xs font-bold uppercase text-slate-500">Lookup</span>${escapeHtml(geo.source || "not available")}${geo.error ? ` - ${escapeHtml(geo.error)}` : ""}</div>
          </div>
          <p class="mt-3 text-xs text-slate-500">Access recorded in the private audit log.</p>
        `;
      } catch (error) {
        result.className = "mt-3 rounded-lg border border-red-200 bg-red-50 p-3 text-sm text-red-700";
        result.innerHTML = `<strong>${escapeHtml(error.message)}</strong><br><span class="text-xs">Sign in with the email configured as <code>ADMIN_EMAIL</code> in Render, then reopen this page.</span> <a class="font-bold text-teal-700 underline" href="auth-portal.html?next=admin.html">Open login</a>`;
      } finally {
        button.disabled = false;
        button.textContent = "Lookup";
      }
    }

    document.getElementById("registrationLookupBtn").addEventListener("click", lookupRegistrationLocation);
    document.getElementById("registrationLookupInput").addEventListener("keydown", event => {
      if (event.key === "Enter") lookupRegistrationLocation();
    });

    async function loadAdmin() {
      const status = document.getElementById("adminStatus");
      try {
        const data = await apiRequest("/api/admin/summary");
        status.textContent = "Admin data loaded.";
        document.getElementById("adminCounts").innerHTML = Object.entries(data.counts).map(([key, value]) =>
          `<div class="rounded-xl border border-slate-200 bg-white p-4 shadow-sm"><span class="text-xs uppercase text-slate-500">${key}</span><strong class="mt-1 block text-2xl text-teal-800">${value}</strong></div>`
        ).join("");
        const db = data.db;
        document.getElementById("adminTables").innerHTML = [
          table("Users", db.registeredProfiles || [], [{key:"name",label:"Name"},{key:"role",label:"Role"},{key:"email",label:"Email"}]),
          table("Jobs", db.jobs || [], [{key:"title",label:"Title"},{key:"status",label:"Status"},{key:"hourlyRate",label:"Rate"}]),
          table("Messages", db.messages || [], [{key:"from",label:"From"},{key:"to",label:"To"},{key:"text",label:"Message"}]),
          table("Investor Interest", db.investorInterests || [], [{key:"investorName",label:"Investor"},{key:"startupName",label:"Startup"},{key:"amount",label:"Amount"}]),
          table("Connections", db.connections || [], [{key:"from",label:"From"},{key:"to",label:"To"},{key:"status",label:"Status"}]),
          table("Reviews", db.reviews || [], [{key:"from",label:"From"},{key:"to",label:"To"},{key:"rating",label:"Rating"}])
        ].join("");
      } catch (error) {
        document.getElementById("adminCounts").innerHTML = "";
        document.getElementById("adminTables").innerHTML = "";
        status.innerHTML = `<strong>Admin locked.</strong> Sign in with the email configured as <code>ADMIN_EMAIL</code> in Render, then return here. <a class="font-bold text-teal-700 underline" href="auth-portal.html?next=admin.html">Open login</a><br><span class="text-xs text-slate-500">${escapeHtml(error.message)}</span>`;
      }
    }
    loadAdmin();
  </script>
</body>
</html>
